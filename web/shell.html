<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>ColorMill</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0f172a;
        color: #e2e8f0;
        font-family: system-ui, sans-serif;
      }

      #shell {
        display: grid;
        place-items: center;
        width: 100vw;
        height: 100vh;
      }

      #nav {
        position: fixed;
        top: 12px;
        left: 12px;
        right: 12px;
        z-index: 5;
        display: flex;
        justify-content: center;
        gap: 10px;
        pointer-events: none;
      }

      #nav a {
        pointer-events: auto;
        color: #e2e8f0;
        text-decoration: none;
        font-size: 13px;
        line-height: 1;
        padding: 8px 11px;
        border: 1px solid rgba(148, 163, 184, 0.45);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.82);
        backdrop-filter: blur(6px);
      }

      canvas.emscripten {
        width: min(100vw, calc(100vh * 1.5));
        height: auto;
        max-height: 100vh;
        border: 0;
        outline: 0;
        touch-action: none;
      }

      #status {
        position: fixed;
        left: 16px;
        bottom: 12px;
        color: #cbd5e1;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <nav id="nav">
      <a href="index.html">Simulator</a>
      <a href="project.html">Project notes</a>
      <a href="resources.html">Resources</a>
      <a href="https://github.com/andrewboudreau/ColorMill">GitHub</a>
    </nav>
    <main id="shell">
      <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    </main>
    <div id="status">Loading ColorMill...</div>
    <script>
      var Module = {
        canvas: document.getElementById('canvas'),
        setStatus: function(text) {
          document.getElementById('status').textContent = text || '';
        },
        onRuntimeInitialized: function() {
          document.getElementById('status').textContent = '';
        }
      };
      window.onerror = function(message) {
        document.getElementById('status').textContent = 'Error: ' + message;
      };
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
