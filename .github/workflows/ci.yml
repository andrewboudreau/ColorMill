name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Fetch raylib
        run: git clone --depth 1 --branch 5.5 https://github.com/raysan5/raylib.git raylib

      - name: Build raylib for web
        run: make -C raylib/src PLATFORM=PLATFORM_WEB

      - name: Build ColorMill web app
        run: make web
